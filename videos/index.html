<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Lectures & Resources | IITian School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../style.css">
</head>

    <div id="nav-placeholder"></div>

    <header class="video-header">
        <div class="container">
            <h1>Our <span style="color: var(--primary);">Video Tutorials</span></h1>
            <p>Access high-quality revision videos direct from the expertise of Bhaskar Sir.</p>

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="video-search" class="search-input"
                    placeholder="Search topics (e.g., resistance, capacitor, revision)...">
            </div>
        </div>
    </header>

    <main class="container">
        <div class="video-grid" id="video-grid">
            <!-- Dynamic Video Cards Inserted Here -->
            <div id="no-results" class="no-results">
                <i class="fa-regular fa-face-frown" style="font-size: 2.5rem; margin-bottom: 1rem; display: block;"></i>
                No matching lectures found. Try a different topic!
            </div>
        </div>

        <div style="text-align: center; margin: 3rem 0;">
            <button id="load-more-btn" class="btn-back"
                style="display: none; border: none; cursor: pointer; padding: 1rem 2rem;">Load More Lectures</button>
        </div>

        <section class="cta-section">
            <h2>Want Direct Coaching from Bhaskar Sir?</h2>
            <p>Get exclusive batches, personal doubt assistance, and custom mock tests.</p>
            <a href="https://wa.me/919692792825?text=Hello%20Bhaskar%20Sir%2C%20I%20want%20direct%20guidance."
                class="btn-whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp Now
            </a>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../script.js"></script>
    <script src="../components.js"></script>
    <script>
        // 16 Video Lectures Master Array
        const videos = [
            { id: "hpkkCPmTKgg", title: "Aeroplane Wind Problem", desc: "Advanced physics tricks to solve relative velocity equations." },
            { id: "6IGsBm2oS5I", title: "Rain Man Problem", desc: "Vector representation shortcuts for quick calculation." },
            { id: "_Vbkwmf-Po4", title: "Vernier Caliper Concepts", desc: "Understand zero errors and least count methodology." },
            { id: "3T0sn7nKZYk", title: "Screw Gauge Problems", desc: "Mastering error analysis criteria effortlessly." },
            { id: "JgitBj-KH48", title: "Thermodynamics", desc: "Important Graphical Problems evaluated step-by-step." },
            { id: "S3KaE_pL3IY", title: "Gravitation Formulas", desc: "Review key planetary motion parameters cleanly." },
            { id: "-I4uujiFqoM", title: "Zener Diode Circuits", desc: "Perfect mapping sequences for quick review." },
            { id: "XeXVEVXXbDQ", title: "Resistance & Capacitance", desc: "Derive equivalent values confidently." },
            { id: "UVf7Hw0JGw8", title: "Equivalent Resistance P6", desc: "Equivalent resistance problems class 12 shortcuts." },
            { id: "HCZ3_pXfSHo", title: "Equivalent Resistance P5", desc: "Equivalent resistance tricks for standard networks." },
            { id: "V-zyxbpbHUg", title: "Equivalent Resistance P4", desc: "Simplifying bridging and parallel connections." },
            { id: "UaZ4u-gxQAE", title: "Equivalent Resistance P44", desc: "Tough configurations cracked effortlessly." },
            { id: "wrpJiNTQyuc", title: "Equivalent Resistance P3", desc: "Symmetry principles applied to circuits." },
            { id: "ovYgJsdEaXk", title: "LC Oscillations", desc: "Ideal energy distribution analysis." },
            { id: "nvf4YlXQ79E", title: "Discharging of Capacitor", desc: "Derive exponential decay boundaries." },
            { id: "ct2LHL7IEFA", title: "Charging of Capacitor", desc: "RC time constant derivation steps." }
        ];

        let visibleCount = 6;
        let currentList = videos;

        const grid = document.getElementById('video-grid');
        const searchInput = document.getElementById('video-search');
        const noResults = document.getElementById('no-results');
        const loadMoreBtn = document.getElementById('load-more-btn');

        function renderVideos() {
            // Clear existing video cards (excluding the no-results div)
            const cards = grid.querySelectorAll('.video-card');
            cards.forEach(c => c.remove());

            if (currentList.length === 0) {
                noResults.style.display = 'block';
                loadMoreBtn.style.display = 'none';
                return;
            }

            noResults.style.display = 'none';

            // Slice currentList up to visibleCount
            const sliced = currentList.slice(0, visibleCount);

            sliced.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card glass';
                card.innerHTML = `
                    <div class="video-frame" style="position: relative; width: 100%; padding-top: 56.25%;">
                        <iframe src="https://www.youtube.com/embed/${v.id}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" title="${v.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                    <div class="video-info" style="padding: 1.5rem;">
                        <h3 style="margin-bottom: 0.5rem; font-size: 1.2rem;">${v.title}</h3>
                        <p style="color: var(--gray); font-size: 0.9rem;">${v.desc}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Show or hide Load More button
            if (visibleCount < currentList.length) {
                loadMoreBtn.style.display = 'inline-block';
            } else {
                loadMoreBtn.style.display = 'none';
            }
        }

        // Load More Handler
        loadMoreBtn.addEventListener('click', () => {
            visibleCount += 3;
            renderVideos();
        });

        // Initial Render
        renderVideos();

        // Live Search Handler
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            currentList = videos.filter(v =>
                v.title.toLowerCase().includes(query) ||
                v.desc.toLowerCase().includes(query)
            );
            visibleCount = 6; // Reset visible slice on search
            renderVideos();
        });
    </script>
</body>

</html>
